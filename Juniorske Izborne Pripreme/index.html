<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moja Zbirka</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f8f9fa;
            color: #333;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            color: #2c3e50;
            margin-bottom: 30px;
        }

        /* Kontejner koji drži sve kućice */
        .mreza-mapa {
            display: flex;
            flex-direction: column; /* Kućice idu jedna ispod druge */
            gap: 15px;              /* Razmak između kućica */
            width: 100%;
            max-width: 500px;
        }

        /* Stil za pojedinu kućicu/karticu */
        .kucica-mape {
            display: flex;
            align-items: center;
            background: white;
            padding: 15px 20px;
            border-radius: 8px;
            border: 1px solid #e0e0e0;
            text-decoration: none;
            color: #2c3e50;
            font-weight: 600;
            font-size: 18px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
            transition: all 0.2s ease;
        }

        /* Stil za strelicu unutar kućice */
        .strelica {
            margin-right: 15px;
            color: #3498db;
            font-size: 20px;
            transition: transform 0.2s ease;
        }

        /* Efekt kada se mišem prijeđe preko kućice */
        .kucica-mape:hover {
            background-color: #ffffff;
            border-color: #3498db;
            box-shadow: 0 4px 12px rgba(52, 152, 219, 0.1);
            transform: translateY(-2px);
        }

        /* Efekt da se strelica malo pomakne kad prođeš mišem */
        .kucica-mape:hover .strelica {
            transform: translateX(4px);
        }
    </style>
</head>
<body>

    <h1>Juniorske Izborne Pripreme</h1>

    <div class="mreza-mapa">

        <!-- Kućica 1 -->
        <a href="2025/index.html" class="kucica-mape">
            <span class="strelica">➔</span>
            2025.
        </a>

    </div>

</body>
</html>
